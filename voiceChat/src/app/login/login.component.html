 <div class="container-fluid main-container">
   <div class="form-container">
     <div class="mb-3">
       <label for="exampleInputEmail1" class="form-label">Email address</label>
       <input type="email" class="form-control" id="exampleInputEmail1" [(ngModel)]="email">
     </div>
     <div class="mb-3">
       <label for="exampleInputPassword1" class="form-label">Password</label>
       <input type="password" class="form-control" id="exampleInputPassword1" [(ngModel)]="password">
     </div>
     <p class="text-danger">{{errorMessage}}</p>
     <button type="submit" class="btn btn-primary" (click)="signIn()">Login</button>
     <a [routerLink]="['/register']">Create an account instead</a>
   </div>
 </div>
